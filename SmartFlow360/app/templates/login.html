<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartFlow360 - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
        padding: 40px;
      }

      .logo {
        text-align: center;
        margin-bottom: 40px;
      }

      .logo h1 {
        color: #333;
        font-size: 28px;
        margin-bottom: 8px;
      }

      .logo p {
        color: #666;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"],
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="password"]:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }

      .form-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        border-bottom: 2px solid #e0e0e0;
      }

      .tab-button {
        flex: 1;
        padding: 12px;
        background: none;
        border: none;
        border-bottom: 3px solid transparent;
        color: #666;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .tab-button.active {
        color: #667eea;
        border-bottom-color: #667eea;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      button[type="submit"] {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      button[type="submit"]:active {
        transform: translateY(0);
      }

      .alert {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .alert.error {
        background-color: #fee;
        color: #c00;
        border: 1px solid #fcc;
        display: block;
      }

      .alert.success {
        background-color: #efe;
        color: #060;
        border: 1px solid #cfc;
        display: block;
      }

      .spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loading button[type="submit"] {
        color: transparent;
      }

      .loading button[type="submit"]::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <h1>SmartFlow360</h1>
        <p>Mini CRM Intelligence Platform</p>
      </div>

      <div class="alert" id="alert"></div>

      <div class="form-tabs">
        <button
          type="button"
          class="tab-button active"
          onclick="switchTab('login')"
        >
          Login
        </button>
        <button
          type="button"
          class="tab-button"
          onclick="switchTab('register')"
        >
          Sign Up
        </button>
      </div>

      <!-- LOGIN TAB -->
      <div id="login" class="tab-content active">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" required />
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              name="password"
              required
            />
          </div>

          <button type="submit">Login</button>
        </form>
      </div>

      <!-- REGISTER TAB -->
      <div id="register" class="tab-content">
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" name="name" required />
          </div>

          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" name="email" required />
          </div>

          <div class="form-group">
            <label for="register-industry">Industry</label>
            <select id="register-industry" name="industry" required>
              <option value="">Select an industry...</option>
              <option value="Technology">Technology</option>
              <option value="Finance">Finance</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Retail">Retail</option>
              <option value="Manufacturing">Manufacturing</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="register-password">Password</label>
            <input
              type="password"
              id="register-password"
              name="password"
              required
              minlength="8"
            />
          </div>

          <div class="form-group">
            <label for="register-confirm">Confirm Password</label>
            <input
              type="password"
              id="register-confirm"
              name="confirm"
              required
              minlength="8"
            />
          </div>

          <button type="submit">Create Account</button>
        </form>
      </div>
    </div>

    <script>
      function switchTab(tabName) {
        // Hide all tabs
        document.querySelectorAll(".tab-content").forEach((tab) => {
          tab.classList.remove("active");
        });
        document.querySelectorAll(".tab-button").forEach((btn) => {
          btn.classList.remove("active");
        });

        // Show selected tab
        document.getElementById(tabName).classList.add("active");
        event.target.classList.add("active");

        // Clear alerts
        clearAlert();
      }

      function showAlert(message, type = "error") {
        const alertDiv = document.getElementById("alert");
        alertDiv.textContent = message;
        alertDiv.className = `alert ${type}`;
      }

      function clearAlert() {
        const alertDiv = document.getElementById("alert");
        alertDiv.className = "alert";
        alertDiv.textContent = "";
      }

      async function handleLogin(event) {
        event.preventDefault();
        clearAlert();

        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json", // ← KEY: Send JSON
            },
            body: JSON.stringify({
              // ← KEY: Use JSON.stringify
              email,
              password,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail || "Login failed");
          }

          // Store session token in localStorage
          localStorage.setItem("session_token", data.session_token);
          localStorage.setItem("user_id", data.id);
          localStorage.setItem("user_name", data.name);

          showAlert(`Welcome back, ${data.name}!`, "success");

          // Redirect to dashboard after 1 second
          setTimeout(() => {
            window.location.href = "/";
          }, 1000);
        } catch (error) {
          console.error("Login error:", error);
          showAlert(error.message, "error");
        }
      }

      async function handleRegister(event) {
        event.preventDefault();
        clearAlert();

        const name = document.getElementById("register-name").value;
        const email = document.getElementById("register-email").value;
        const industry = document.getElementById("register-industry").value;
        const password = document.getElementById("register-password").value;
        const confirm = document.getElementById("register-confirm").value;

        // Validate passwords match
        if (password !== confirm) {
          showAlert("Passwords do not match", "error");
          return;
        }

        try {
          const response = await fetch("/api/auth/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name,
              email,
              industry,
              password,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail || "Registration failed");
          }

          showAlert("Account created! Switching to login...", "success");

          // Switch to login tab
          setTimeout(() => {
            document.querySelector("[onclick=\"switchTab('login')\"]").click();
            document.getElementById("login-email").value = email;
            document.getElementById("login-password").focus();
          }, 1500);
        } catch (error) {
          showAlert(error.message, "error");
        }
      }

    </script>
  </body>
</html>
