<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SmartFlow360</title>
  <style>
    body { font-family: Arial, sans-serif; width: 380px; margin: 0; padding: 12px; }
    h3 { margin: 0 0 10px; }
    label { display: block; margin-top: 10px; font-size: 12px; color: #444; }
    textarea, input { width: 100%; box-sizing: border-box; }
    textarea { padding: 8px; }
    input { padding: 8px; }
    button { width: 100%; padding: 10px; margin-top: 8px; cursor: pointer; }
    .row { display: flex; gap: 8px; }
    .row button { width: 50%; }
    small { color: #666; }
    pre { background: #f5f5f5; padding: 8px; white-space: pre-wrap; max-height: 200px; overflow: auto; }
    .muted { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h3>SmartFlow360</h3>
  <div class="muted">Backend: <span id="apiBaseText"></span></div>

  <label>Notes (paste or extracted from file)</label>
  <textarea id="notes" rows="6" placeholder="Paste notes here or extract from a PDF/DOCX..."></textarea>

  <label>Voice add-on (dictation goes here)</label>
  <textarea id="voiceAddon" rows="4" placeholder="Dictate anything missing from the PDF..."></textarea>

  <div class="row">
    <button id="startDictate" type="button">Start Dictation</button>
    <button id="stopDictate" type="button" disabled>Stop</button>
  </div>
  <div class="muted" id="dictationStatus"></div>

  <label>Upload file to extract</label>
  <input id="file" type="file" accept=".pdf,.docx,.txt,.md,.csv,.json" />
  <button id="extractBtn" type="button">Extract File → Notes</button>

  <button id="analyzeBtn" type="button">Analyze</button>

  <label>Email (send PDF report)</label>
  <input id="email" type="email" placeholder="you@example.com" />
  <button id="emailBtn" type="button" disabled>Email PDF Report</button>

  <button id="clearBtn" type="button">Clear</button>

  <p><small id="status"></small></p>

  <pre id="out"></pre>

  <script src="popup.js"></script>
</body>
</html>
